<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Uncharted</title>
  <meta itemprop="name" content="Uncharted">
  <meta name="twitter:title" content="Uncharted">
  <meta property="og:title" content="Uncharted">
  <meta property="og:site_name" content="Uncharted">
  <meta name="description" content="">
  <meta itemprop="description" content="">
  <meta property="og:description" content="">
  <meta name="twitter:description" content="">
  <meta property="og:image" content="https://evanmcarlson.github.io/uncharted/assets/puzzle.png">

  <script crossorigin="anonymous" src="./external/scripts/8frame-1.4.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js" crossorigin="anonymous"></script>

  <script src="./external/scripts/aframe-extras-6.1.1.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&amp;display=swap" rel="stylesheet"/>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.147.0/examples/jsm/"
      }
    }
  </script>

  <style>
    .scan-bracket {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke: #E5E5E5;
      transition: stroke 0.15s;
    }
    #scan-svg.breathing {
      animation: breathe 1.8s ease-in-out infinite;
      transform-origin: 50% 50%;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.035); }
    }
    #scan-hint {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: calc(50% + 24vmin);
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      font-weight: 500;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      white-space: nowrap;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      letter-spacing: 0.01em;
      opacity: 1;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    #scan-hint.hidden { opacity: 0; }
    #photo-overlay {
      position: fixed;
      bottom: 20px;
      left: 50%;
      z-index: 50;
      background: rgba(15, 15, 15, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      width: calc(100% - 40px);
      max-width: 380px;
      padding: 14px;
      box-sizing: border-box;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 14px;
      transform: translateX(-50%) translateY(calc(100% + 40px));
      transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1);
      overflow: hidden;
    }
    #photo-overlay.visible {
      transform: translateX(-50%) translateY(0);
    }
    #photo-overlay-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #overlay-verifying { display: flex; flex-direction: row; align-items: center; gap: 10px; }
    .overlay-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: overlay-spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes overlay-spin { to { transform: rotate(360deg); } }
    #verify-progress-track {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
      display: none;
    }
    #photo-overlay.verifying #verify-progress-track { display: block; }
    #verify-progress-fill {
      height: 100%;
      width: 40%;
      background: #0088ff;
      animation: verify-slide 1.4s ease-in-out infinite;
    }
    @keyframes verify-slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(260%); }
    }
    #overlay-result { display: none; flex-direction: column; align-items: flex-start; gap: 8px; }
    #overlay-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #overlay-icon.success { background: #0088ff; color: #fff; }
    #overlay-icon.failed  { background: #E57373; color: #fff; }
    @keyframes popIn {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    #overlay-title {
      margin: 0;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #overlay-reason {
      margin: 0;
      color: rgba(255,255,255,0.65);
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #overlay-action-btn {
      margin-top: 4px;
      padding: 10px 24px;
      border-radius: 50px;
      border: 2px solid rgba(255,255,255,0.55);
      background: transparent;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      cursor: pointer;
    }
    #overlay-name-group {
      display: none;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      margin-top: 4px;
    }
    #overlay-name-input {
      padding: 12px 16px;
      border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center;
      outline: none;
    }
    #overlay-name-input::placeholder { color: rgba(255,255,255,0.3); }
    #overlay-name-input:focus { border-color: #0088ff; }
    #overlay-submit-btn {
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: #0088ff;
      color: #000;
      font-size: 15px;
      font-weight: 700;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      cursor: pointer;
    }
    #overlay-submit-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }
    .overlay-label {
      margin: 0;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
  </style>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { GlitchPass } from 'three/addons/postprocessing/GlitchPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { TexturePass } from 'three/addons/postprocessing/TexturePass.js';
    import { AfterimagePass } from 'three/addons/postprocessing/AfterimagePass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

    window.THREE = { ...THREE };
    window.THREE.GLTFLoader = GLTFLoader;
    window.THREE.EffectComposer = EffectComposer;
    window.THREE.RenderPass = RenderPass;
    window.THREE.GlitchPass = GlitchPass;
    window.THREE.UnrealBloomPass = UnrealBloomPass;
    window.THREE.TexturePass = TexturePass;
    window.THREE.AfterimagePass = AfterimagePass;
    window.THREE.ShaderPass = ShaderPass;
    window.dispatchEvent(new CustomEvent('threeloaded'));
  </script>

</head>

<body>
  <script src="bundle.js"></script>
  <a-scene
    xrextras-gesture-detector
    landing-page="backgroundColor: #000;"
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true; preserveDrawingBuffer: true"
    xrweb
    custom-events
    solved-btn
    postprocessing>
    <a-assets>
      <a-asset-item id="octopusModel" src="./assets/octo.glb"></a-asset-item>

      <a-asset-item id="puzzleModel" src="./assets/puzzle.glb"></a-asset-item>

      <img id="puzzleImg" src="./assets/puzzle.png" />
      <img id="puzzleTriangleImg" src="./assets/triangle.png" />
    </a-assets>

    <a-camera
      id="camera"
      position="0 8 8"
      zraycaster="objects: .cantap"
      zcursor="fuse: false; rayOrigin: mouse;">
    </a-camera>

    <a-light type="ambient" intensity="1"></a-light>

    <xrextras-named-image-target name="puzzle"> </xrextras-named-image-target>

    <a-entity visible="false" spawn>
      <a-entity
        id="puzzle"
        gltf-model="#puzzleModel"
        rotation="90 0 0"
        scale="0.2 0.2 0.2"></a-entity>
      <a-entity
        id="octopus"
        gltf-model="#octopusModel"
        animation-mixer="clip: *"
        position="0 0 -1"
        rotation="-90 0 180"
        shadow="receive: false"
        wireframe-material
        data-bloom="bloom">
      </a-entity>
      <a-plane
        id="triangle"
        src="#puzzleTriangleImg"
        width="1.25"
        height="0.83333333333"
        material="transparent: true"
        data-bloom="bloom">
      </a-plane>
    </a-entity>
  </a-scene>

  <div id="scan-overlay" style="position:fixed; inset:0; pointer-events:none; z-index:1;">
    <svg id="scan-svg" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
      <path id="bracket-tl" class="scan-bracket"/>
      <path id="bracket-tr" class="scan-bracket"/>
      <path id="bracket-br" class="scan-bracket"/>
      <path id="bracket-bl" class="scan-bracket"/>
    </svg>
    <div id="scan-hint">looking for puzzle</div>
  </div>

  <div id="photo-overlay">
    <div id="verify-progress-track"><div id="verify-progress-fill"></div></div>
    <div id="photo-overlay-content">
      <div id="overlay-verifying">
        <div class="overlay-spinner"></div>
        <p class="overlay-label">Verifying…</p>
      </div>
      <div id="overlay-result">
        <div id="overlay-icon"></div>
        <p id="overlay-title"></p>
        <p id="overlay-reason"></p>
        <div id="overlay-name-group">
          <input id="overlay-name-input" type="text" maxlength="50" placeholder="Your name" autocomplete="off" />
          <button id="overlay-submit-btn">Submit to Leaderboard</button>
        </div>
        <button id="overlay-action-btn"></button>
        <!-- DEV ONLY: remove before launch -->
        <button id="overlay-dev-verify-btn" style="display:none;margin-top:4px;padding:8px 20px;border-radius:50px;border:1px dashed rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.3);font-size:12px;font-family:-apple-system,sans-serif;cursor:pointer;">Verify Anyway (dev)</button>
        <!-- /DEV -->
      </div>
    </div>
  </div>

</body>

</html>

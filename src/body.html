<a-scene
  xrextras-gesture-detector
  landing-page="backgroundColor: #000;"
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement: true"
  xrweb="allowedDevices: any;"
  custom-events
  solved-btn
  postprocessing>
  <a-assets>
    <a-asset-item id="octopusModel" src="./assets/octo.glb"></a-asset-item>

    <a-asset-item id="puzzleModel" src="./assets/puzzle.glb"></a-asset-item>

    <img id="puzzleImg" src="./assets/puzzle.png" />
    <img id="puzzleTriangleImg" src="./assets/triangle.png" />
  </a-assets>

  <a-camera
    id="camera"
    position="0 8 8"
    zraycaster="objects: .cantap"
    zcursor="fuse: false; rayOrigin: mouse;">
  </a-camera>

  <a-light type="ambient" intensity="1"></a-light>

  <xrextras-named-image-target name="puzzle"> </xrextras-named-image-target>

  <a-entity visible="false" spawn>
    <a-entity
      id="puzzle"
      gltf-model="#puzzleModel"
      rotation="90 0 0"
      scale="0.2 0.2 0.2"></a-entity>
    <a-entity
      id="octopus"
      gltf-model="#octopusModel"
      animation-mixer="clip: *"
      position="0 0 -1"
      rotation="-90 0 180"
      shadow="receive: false"
      wireframe-material
      data-bloom="bloom">
    </a-entity>
    <a-plane
      id="triangle"
      src="#puzzleTriangleImg"
      width="1.25"
      height="0.83333333333"
      material="transparent: true"
      data-bloom="bloom">
    </a-plane>
  </a-entity>
</a-scene>
